<h1>Dashboard Registration</h1>
<app-navbar [user]="currentUser"></app-navbar>
<form [formGroup]="registerForm">
    <div class="form-group">
        <label class="form-label" for="name">Name</label>
        <input class="form-control" type="text" placeholder="Enter name..." formControlName="name">
    </div>
    <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="text" placeholder="Enter email..." formControlName="email">
    </div>
    <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="text" placeholder="*****" formControlName="password">
    </div>
    <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input class="form-control" type="text" formControlName="confirmPassword" >
    </div>
    <button class="btn" (ngSubmit)="handleRegister()" [disabled]="registerForm.invalid">Register</button>
</form>
